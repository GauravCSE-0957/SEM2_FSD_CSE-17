<!DOCTYPE html>
<html>
<head>
    <title>Music Library System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>🎵 Music Library System</h1>

<div class="box">
    <h2>Add Song (YouTube)</h2>
    <input id="title" placeholder="Song Title">
    <input id="artist" placeholder="Artist">
    <input id="url" placeholder="YouTube Video Link">
    <button onclick="addSong()">Add Song</button>
</div>

<div class="box">
    <h2>Search Song</h2>
    <input id="search" placeholder="Search song">
    <button onclick="searchSong()">Search</button>
    <div id="result"></div>
</div>

<div class="box">
    <h2>Library (Favorites)</h2>
    <button onclick="loadLibrary()">Show Library</button>
    <div id="library"></div>
</div>

<div class="box">
    <h2>YouTube Player</h2>
    <iframe id="ytplayer"
            width="100%"
            height="315"
            src=""
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
    </iframe>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
